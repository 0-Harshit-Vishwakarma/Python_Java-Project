{% extends 'base.html' %}
{% block content %}
<div class="container my-5">
    <div class="row row-cols-1 row-cols-md-3 g-4">
        {% for n in ap %}
        <div class="col">
            <div class="card h-100 shadow-sm border-0">
                {% if n.image %}
                <img src="{{ n.image.url }}" class="card-img-top" alt="Post Image" style="height: 200px; object-fit: cover;">
                {% endif %}
                <div class="card-body d-flex flex-column">
                    <h5 class="card-title text-primary">{{ n.title }}</h5>
                    <p class="card-text">{{ n.content|truncatechars:100 }}</p>
                    <p class="card-text text-muted small mb-1">Created: {{ n.created_at|date:"Y-m-d H:i" }}</p>
                    <p class="card-text text-muted small mb-3">Updated: {{ n.updated_at|date:"Y-m-d H:i" }}</p>
                    <a href="{% url 'blog_detail' n.id %}" class="btn btn-outline-primary mt-auto">Read More</a>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
