{%extends 'base.html' %}
{%block content %}
<div class="container mt-5">
<div class="d-flex justify-content-between align-items-center mb-4">
<h1 class="display-6">📋 Dashboard</h1>
<a href="{% url 'add_blog' %}" class="btn btn-primary">+ Add New Blog</a>
</div>
<h2 class="h4 text-muted mb-3">Your Blogs</h2>
{% if user_blogs %}
<div class="list-group">
{%for blog in user_blogs %}
<div class="list-group-item list-group-item-action flex-column align-items-start mb-2 shadow-sm
rounded">
<div class="d-flex w-100 justify-content-between">
<h5 class="mb-1">{{ blog.title }}</h5>
<small class="text-muted">{{ blog.created_at|date:"Y-m-d" }}</small>
</div>
Edit
    </a>
<div class="mt-2">
<a href="{% url 'edit_blog' blog.id %}" class="btn btn-sm btn-outline-secondary me-2">✏️
<a href="{% url 'delete_blog' blog.id %}" class="btn btn-sm btn-outline-danger">🗑️Delete</a>
</div>
</div>
{%endfor %}
</div>
{%else %}
<div class="alert alert-info mt-3" role="alert">
You haven't created any blogs yet.
</div>
{%endif %}
</div>
{%endblock %}
